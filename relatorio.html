<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Vendas - Bodega Mooca Bello</title>
<style>
  :root{--ouro:#c8962a;--preto:#141210;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0d0b09;color:#f5efe2;padding-bottom:40px;}
  header{background:var(--preto);padding:14px;text-align:center;border-bottom:3px solid var(--ouro);position:sticky;top:0;z-index:20;}
  header h1{color:var(--ouro);font-size:17px;letter-spacing:1px;}
  .voltar{position:absolute;left:12px;top:12px;background:#221a12;border:1px solid #3a2d1c;color:#e9dcc4;border-radius:20px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
  .fonte{ text-align:center;font-size:11px;padding:4px 0;background:#0d0b09;color:#8fc98f;}
  .fonte.off{color:#e7b95c;}
  .periodos{display:flex;gap:8px;overflow-x:auto;padding:12px;scrollbar-width:none;}
  .periodos::-webkit-scrollbar{display:none;}
  .p-btn{flex:0 0 auto;background:#221a12;color:#e9dcc4;border:1px solid #3a2d1c;padding:9px 14px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .p-btn.active{background:var(--ouro);color:#1b1409;border-color:var(--ouro);}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px;}
  .card{background:#17130f;border:1px solid #2a2118;border-radius:14px;padding:14px;}
  .card .lbl{font-size:12px;color:#8a7c64;text-transform:uppercase;letter-spacing:1px;}
  .card .val{font-size:22px;font-weight:800;color:var(--ouro);margin-top:4px;}
  .card.full{grid-column:1/-1;}
  .sec{padding:16px 12px 4px;font-size:13px;color:#8a7c64;text-transform:uppercase;letter-spacing:1px;}
  .linha{display:flex;justify-content:space-between;gap:8px;background:#17130f;border:1px solid #2a2118;border-radius:10px;padding:11px 12px;margin:0 12px 8px;font-size:14px;align-items:center;}
  .linha .q{color:#8a7c64;font-size:12px;}
  .linha b{color:var(--ouro);white-space:nowrap;}
  .vazio{padding:30px;text-align:center;color:#6b5c44;}
  .btn-csv{display:block;margin:16px 12px 0;width:calc(100% - 24px);background:#2a4d1e;color:#c6f0a8;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<header>
  <a class="voltar" href="garcom.html">← Voltar</a>
  <h1>📊 Relatório de Vendas</h1>
</header>
<div class="fonte" id="fonte">☁️ carregando...</div>

<div class="periodos" id="periodos"></div>
<div class="cards" id="cards"></div>
<div id="conteudo"></div>
<button class="btn-csv" onclick="exportarCSV()">⬇️ Exportar planilha (CSV)</button>

<script>
const API_URL='https://pdv-vendas.spyfer2.workers.dev';
const LS_PIN='pin_bmb';
let VENDAS=[], PGTOS=[], periodo='hoje', online=false;

function money(v){return 'R$ '+v.toFixed(2).replace('.',',');}
function hoje(){return new Date().toISOString().slice(0,10);}
function diasAtras(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function fmtData(iso){return iso.split('-').reverse().join('/');}

const PERIODOS=[
  {id:'hoje', nome:'Hoje',      de:()=>hoje()},
  {id:'ontem',nome:'Ontem',     de:()=>diasAtras(1), ate:()=>diasAtras(1)},
  {id:'7',    nome:'7 dias',    de:()=>diasAtras(6)},
  {id:'30',   nome:'30 dias',   de:()=>diasAtras(29)},
  {id:'mes',  nome:'Este mês',  de:()=>hoje().slice(0,8)+'01'},
  {id:'tudo', nome:'Tudo',      de:()=>'2000-01-01'},
];
function intervalo(){const p=PERIODOS.find(x=>x.id===periodo);return [p.de(), p.ate?p.ate():hoje()];}

function getPin(){
  let pin=localStorage.getItem(LS_PIN);
  if(!pin){pin=prompt('PIN do banco de vendas (uma vez só neste aparelho):')||'';if(pin)localStorage.setItem(LS_PIN,pin.trim());}
  return (pin||'').trim();
}

async function carregar(){
  const [de,ate]=intervalo();
  const f=document.getElementById('fonte');
  const pin=getPin();
  if(pin){
    try{
      const r=await fetch(API_URL+'/api/relatorio?de='+de+'&ate='+ate,{headers:{'X-PIN':pin}});
      if(r.status===401){localStorage.removeItem(LS_PIN);throw new Error('pin');}
      const d=await r.json();
      VENDAS=d.vendas||[];PGTOS=d.pagamentos||[];online=true;
      f.textContent='☁️ dados da nuvem';f.classList.remove('off');
      render();return;
    }catch(e){}
  }
  // fallback: dados locais deste aparelho
  online=false;
  let hist=[];try{hist=JSON.parse(localStorage.getItem('historico_bmb'))||[];}catch(e){}
  VENDAS=[];PGTOS=[];
  hist.forEach(r=>{
    if(r.data<de||r.data>ate)return;
    if(r.tipo==='venda')r.itens.forEach(i=>VENDAS.push({data:r.data,hora:r.hora,mesa:r.mesa,origem:r.origem,item:i.nome,qtd:i.qtd,preco:i.preco,total:Math.round(i.qtd*i.preco*100)/100}));
    if(r.tipo==='pagamento')PGTOS.push({data:r.data,hora:r.hora,mesa:r.mesa,total:r.total,pgto:r.pgto,pessoas:r.pessoas});
  });
  f.textContent='📵 sem conexão com a nuvem — mostrando só as vendas deste aparelho';f.classList.add('off');
  render();
}

function renderPeriodos(){
  document.getElementById('periodos').innerHTML=PERIODOS.map(p=>
    '<button class="p-btn '+(periodo===p.id?'active':'')+'" onclick="setPeriodo(\''+p.id+'\')">'+p.nome+'</button>').join('');
}
function setPeriodo(id){periodo=id;renderPeriodos();carregar();}

function render(){
  const fat=VENDAS.reduce((s,v)=>s+v.total,0);
  const nItens=VENDAS.reduce((s,v)=>s+v.qtd,0);
  const pedidos=new Set(VENDAS.map(v=>v.data+'|'+v.hora+'|'+v.mesa)).size;

  let cards='<div class="card full"><div class="lbl">💰 Faturamento (enviado à cozinha)</div><div class="val">'+money(fat)+'</div></div>';
  cards+='<div class="card"><div class="lbl">Pedidos</div><div class="val">'+pedidos+'</div></div>';
  cards+='<div class="card"><div class="lbl">Itens vendidos</div><div class="val">'+nItens+'</div></div>';
  const porForma={};PGTOS.forEach(x=>porForma[x.pgto]=(porForma[x.pgto]||0)+x.total);
  const recebido=PGTOS.reduce((s,x)=>s+x.total,0);
  cards+='<div class="card full"><div class="lbl">💳 Contas fechadas: '+money(recebido)+'</div><div class="val" style="font-size:14px;color:#e9dcc4;font-weight:600">'+
    (PGTOS.length? '📱 Pix '+money(porForma['Pix']||0)+' &nbsp;·&nbsp; 💵 Dinheiro '+money(porForma['Dinheiro']||0)+' &nbsp;·&nbsp; 💳 Cartão '+money(porForma['Cartão']||0) : 'Nenhuma conta fechada no período')+'</div></div>';
  document.getElementById('cards').innerHTML=cards;

  let h='';
  const rank={};
  VENDAS.forEach(v=>{if(!rank[v.item])rank[v.item]={qtd:0,tot:0};rank[v.item].qtd+=v.qtd;rank[v.item].tot+=v.total;});
  const top=Object.entries(rank).sort((a,b)=>b[1].tot-a[1].tot);
  if(top.length){
    h+='<div class="sec">🏆 Mais vendidos</div>';
    top.forEach(([nome,x])=>{h+='<div class="linha"><span>'+nome+' <span class="q">×'+x.qtd+'</span></span><b>'+money(x.tot)+'</b></div>';});
  }
  const porDia={};
  VENDAS.forEach(v=>{porDia[v.data]=(porDia[v.data]||0)+v.total;});
  const dias=Object.entries(porDia).sort((a,b)=>b[0].localeCompare(a[0]));
  if(dias.length>1){
    h+='<div class="sec">📅 Por dia</div>';
    dias.forEach(([d,t])=>{h+='<div class="linha"><span>'+fmtData(d)+'</span><b>'+money(t)+'</b></div>';});
  }
  if(VENDAS.length){
    h+='<div class="sec">🧾 Últimos lançamentos</div>';
    VENDAS.slice(0,40).forEach(v=>{
      h+='<div class="linha"><span>'+fmtData(v.data)+' '+v.hora+' · Mesa '+v.mesa+'<br><span class="q">'+v.qtd+'x '+v.item+'</span></span><b>'+money(v.total)+'</b></div>';});
  }
  if(!VENDAS.length&&!PGTOS.length) h='<div class="vazio">Nenhuma venda registrada no período.<br>As vendas aparecem aqui quando os pedidos são enviados à cozinha.</div>';
  document.getElementById('conteudo').innerHTML=h;
}

function exportarCSV(){
  if(!VENDAS.length){alert('Nada para exportar neste período.');return;}
  let csv='data;hora;mesa;item;quantidade;preco_unit;total\n';
  VENDAS.forEach(v=>{
    csv+=[fmtData(v.data),v.hora,v.mesa,'"'+v.item.replace(/"/g,'""')+'"',v.qtd,v.preco.toFixed(2).replace('.',','),v.total.toFixed(2).replace('.',',')].join(';')+'\n';
  });
  const blob=new Blob(["﻿"+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='vendas_'+periodo+'_'+hoje()+'.csv';a.click();
}
renderPeriodos();carregar();
</script>
</body>
</html>
