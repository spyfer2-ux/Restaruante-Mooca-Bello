<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bodega Mooca Bello - Cardápio</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<meta name="theme-color" content="#c8962a">
<style>
  :root{ --ouro:#c8962a; --preto:#141210; --card:#1f1b17; --linha:#3a332b; --branco:#f5efe4; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:'Segoe UI',system-ui,Arial,sans-serif; background:var(--preto); color:var(--branco); padding-bottom:90px; }
  header{ background:linear-gradient(180deg,#1c1712,#141210); padding:10px 12px; text-align:center; position:sticky; top:0; z-index:50; border-bottom:2px solid var(--ouro); display:flex; align-items:center; gap:12px; justify-content:center; }
  header img{ width:52px; height:52px; border-radius:50%; object-fit:cover; background:#fff; }
  header .tit h1{ color:var(--ouro); font-size:1.35rem; letter-spacing:1px; line-height:1; }
  header .tit p{ color:#c9bfa8; font-size:.75rem; margin-top:3px; }
  .busca-wrap{ padding:10px 12px; position:sticky; top:74px; background:var(--preto); z-index:40; }
  #busca{ width:100%; padding:16px; font-size:1.1rem; border-radius:14px; border:2px solid var(--linha); background:#241f19; color:var(--branco); }
  #busca::placeholder{ color:#8c8172; }
  .cats{ display:flex; gap:8px; overflow-x:auto; padding:6px 12px 12px; scrollbar-width:none; }
  .cats::-webkit-scrollbar{ display:none; }
  .cat-btn{ flex:0 0 auto; background:var(--card); border:2px solid var(--linha); color:var(--branco); border-radius:14px; padding:10px 16px; font-size:1rem; font-weight:600; white-space:nowrap; }
  .cat-btn.ativo{ background:var(--ouro); color:#111; border-color:var(--ouro); }
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:0 12px; }
  @media(min-width:700px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  @media(min-width:1000px){ .grid{ grid-template-columns:repeat(4,1fr); } }
  .item{ background:var(--card); border:2px solid var(--linha); border-radius:16px; overflow:hidden; display:flex; flex-direction:column; }
  .item .foto{ width:100%; height:110px; background:#2a241d center/cover no-repeat; display:flex; align-items:center; justify-content:center; font-size:3rem; }
  .item .corpo{ padding:10px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .item .nome{ font-size:.95rem; font-weight:700; line-height:1.15; }
  .item .desc{ font-size:.72rem; color:#a99e88; line-height:1.2; flex:1; }
  .item .preco{ color:var(--ouro); font-size:1.15rem; font-weight:800; }
  .add-row{ display:flex; align-items:center; gap:8px; margin-top:4px; }
  .add-btn{ flex:1; background:var(--ouro); color:#111; border:none; border-radius:12px; padding:12px; font-size:1rem; font-weight:800; }
  .qtd-ctrl{ display:flex; align-items:center; gap:10px; width:100%; justify-content:space-between; background:#2a241d; border-radius:12px; padding:4px; }
  .qtd-ctrl button{ width:42px; height:42px; font-size:1.4rem; font-weight:800; border:none; border-radius:10px; background:var(--ouro); color:#111; }
  .qtd-ctrl span{ font-size:1.3rem; font-weight:800; min-width:30px; text-align:center; }
  #barra-carrinho{ position:fixed; bottom:0; left:0; right:0; background:var(--ouro); color:#111; padding:16px; display:flex; justify-content:space-between; align-items:center; font-weight:800; font-size:1.15rem; z-index:60; box-shadow:0 -4px 12px rgba(0,0,0,.4); }
  #barra-carrinho.off{ display:none; }
  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; display:none; align-items:flex-end; }
  .modal.on{ display:flex; }
  .modal-box{ background:var(--preto); width:100%; max-height:90vh; border-radius:20px 20px 0 0; padding:16px; overflow-y:auto; border-top:2px solid var(--ouro); }
  .modal-box h2{ color:var(--ouro); margin-bottom:12px; }
  .linha-ped{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--linha); gap:8px; }
  .linha-ped .info{ flex:1; }
  .mini-ctrl{ display:flex; align-items:center; gap:8px; }
  .mini-ctrl button{ width:34px; height:34px; border:none; border-radius:8px; background:var(--card); color:var(--branco); font-size:1.2rem; font-weight:800; }
  .campo{ width:100%; padding:14px; font-size:1rem; border-radius:12px; border:2px solid var(--linha); background:#241f19; color:var(--branco); margin-top:10px; }
  .btn-grande{ width:100%; padding:18px; font-size:1.2rem; font-weight:800; border:none; border-radius:14px; margin-top:12px; }
  .btn-ouro{ background:var(--ouro); color:#111; }
  .btn-linha{ background:transparent; color:var(--branco); border:2px solid var(--linha); }
  .total-modal{ font-size:1.4rem; color:var(--ouro); font-weight:800; text-align:right; margin-top:10px; }
</style>
</head>
<body>
<header>
  <img src="logo.png" alt="logo" onerror="this.style.display='none'">
  <div class="tit"><h1>BODEGA MOOCA BELLO</h1><p>Comida • Bebida • Amigos</p></div>
</header>

<div class="busca-wrap">
  <input id="busca" type="search" placeholder="🔍 Buscar prato ou bebida..." oninput="render()">
</div>
<div class="cats" id="cats"></div>
<div class="grid" id="grid"></div>

<div id="barra-carrinho" class="off" onclick="abrirCarrinho()">
  <span>🛒 <span id="cart-qtd">0</span> itens</span>
  <span>Ver pedido • R$ <span id="cart-total">0,00</span></span>
</div>

<div class="modal" id="modal-carrinho">
  <div class="modal-box">
    <h2>🛒 Seu Pedido</h2>
    <div id="lista-pedido"></div>
    <div class="total-modal">Total: R$ <span id="modal-total">0,00</span></div>
    <input class="campo" id="mesa" type="text" placeholder="Nº da mesa / nome do cliente">
    <textarea class="campo" id="obs" rows="2" placeholder="Observações (ex: sem cebola)"></textarea>
    <button class="btn-grande btn-ouro" onclick="enviarCozinha()">📤 Enviar para a Cozinha / Imprimir</button>
    <button class="btn-grande btn-linha" onclick="fecharCarrinho()">Continuar escolhendo</button>
  </div>
</div>

<script>
let PRODUTOS=[], CATS=[], catAtiva='todos', carrinho={};

async function carregar(){
  try{
    const r = await fetch('dados.json?v='+Date.now());
    const d = await r.json();
    PRODUTOS = d.produtos.map((p,i)=>({...p, id:i})).filter(p=>p.ativo!==false);
    CATS = d.categorias;
    if(d.restaurante){ document.querySelector('header h1').textContent=d.restaurante.nome; if(d.restaurante.slogan) document.querySelector('header p').textContent=d.restaurante.slogan; }
    renderCats(); render();
  }catch(e){ document.getElementById('grid').innerHTML='<p style="padding:20px">Erro ao carregar cardápio. Recarregue a página.</p>'; }
}

function renderCats(){
  let h='<button class="cat-btn ativo" onclick="setCat(\'todos\',this)">📋 Todos</button>';
  CATS.forEach(c=>{ h+='<button class="cat-btn" onclick="setCat(\''+c.id+'\',this)">'+c.icone+' '+c.nome+'</button>'; });
  document.getElementById('cats').innerHTML=h;
}
function setCat(id,el){ catAtiva=id; document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('ativo')); el.classList.add('ativo'); render(); }

function iconeCat(cat){ const c=CATS.find(x=>x.id===cat); return c?c.icone:'🍽️'; }
function fmt(v){ return v.toFixed(2).replace('.',','); }

function render(){
  const busca=(document.getElementById('busca').value||'').toLowerCase();
  let lista=PRODUTOS.filter(p=>{
    const okCat = catAtiva==='todos' || p.cat===catAtiva;
    const okBusca = !busca || p.nome.toLowerCase().includes(busca) || (p.desc||'').toLowerCase().includes(busca);
    return okCat && okBusca;
  });
  let h='';
  lista.forEach(p=>{
    const q=carrinho[p.id]?carrinho[p.id].qtd:0;
    const foto = p.foto ? 'style="background-image:url(\''+p.foto+'\')"' : '';
    const emoji = p.foto ? '' : iconeCat(p.cat);
    h+='<div class="item"><div class="foto" '+foto+'>'+emoji+'</div><div class="corpo">'+
       '<div class="nome">'+p.nome+'</div>'+
       '<div class="desc">'+(p.desc||'')+'</div>'+
       '<div class="preco">R$ '+fmt(p.preco)+'</div>'+
       '<div class="add-row">'+ (q>0 ?
         '<div class="qtd-ctrl"><button onclick="mudar('+p.id+',-1)">−</button><span>'+q+'</span><button onclick="mudar('+p.id+',1)">+</button></div>'
         : '<button class="add-btn" onclick="mudar('+p.id+',1)">+ Adicionar</button>')+
       '</div></div></div>';
  });
  document.getElementById('grid').innerHTML = h || '<p style="padding:20px;grid-column:1/-1">Nenhum item encontrado.</p>';
  atualizarBarra();
}

function mudar(id,d){
  const p=PRODUTOS.find(x=>x.id===id);
  if(!carrinho[id]) carrinho[id]={...p,qtd:0};
  carrinho[id].qtd+=d;
  if(carrinho[id].qtd<=0) delete carrinho[id];
  render();
  if(document.getElementById('modal-carrinho').classList.contains('on')) renderPedido();
}

function totais(){ let q=0,t=0; Object.values(carrinho).forEach(i=>{q+=i.qtd; t+=i.qtd*i.preco;}); return {q,t}; }
function atualizarBarra(){
  const {q,t}=totais(); const b=document.getElementById('barra-carrinho');
  document.getElementById('cart-qtd').textContent=q; document.getElementById('cart-total').textContent=fmt(t);
  b.classList.toggle('off', q===0);
}
function abrirCarrinho(){ renderPedido(); document.getElementById('modal-carrinho').classList.add('on'); }
function fecharCarrinho(){ document.getElementById('modal-carrinho').classList.remove('on'); }
function renderPedido(){
  let h=''; const {t}=totais();
  Object.values(carrinho).forEach(i=>{
    h+='<div class="linha-ped"><div class="info"><b>'+i.nome+'</b><br><small>R$ '+fmt(i.preco)+' cada</small></div>'+
       '<div class="mini-ctrl"><button onclick="mudar('+i.id+',-1)">−</button><b>'+i.qtd+'</b><button onclick="mudar('+i.id+',1)">+</button></div></div>';
  });
  document.getElementById('lista-pedido').innerHTML=h||'<p>Pedido vazio</p>';
  document.getElementById('modal-total').textContent=fmt(t);
}

function enviarCozinha(){
  const {q,t}=totais();
  if(q===0){ alert('Adicione itens ao pedido primeiro.'); return; }
  const mesa=document.getElementById('mesa').value||'---';
  const obs=document.getElementById('obs').value||'';
  const agora=new Date();
  let cupom='';
  cupom+='<div style="font-family:monospace;width:280px;color:#000">';
  cupom+='<div style="text-align:center"><b style="font-size:18px">BODEGA MOOCA BELLO</b><br>*** PEDIDO COZINHA ***</div><hr>';
  cupom+='Mesa/Cliente: <b>'+mesa+'</b><br>';
  cupom+='Data: '+agora.toLocaleString('pt-BR')+'<br><hr>';
  Object.values(carrinho).forEach(i=>{ cupom+='<b>'+i.qtd+'x</b> '+i.nome+'<br>'; });
  cupom+='<hr>';
  if(obs) cupom+='OBS: '+obs+'<br><hr>';
  cupom+='TOTAL: R$ '+fmt(t)+'<br>';
  cupom+='<div style="text-align:center;margin-top:8px">Comida • Bebida • Amigos</div></div>';
  const w=window.open('','_blank','width=320,height=600');
  w.document.write('<html><head><title>Pedido</title><style>@media print{@page{margin:4mm;size:80mm auto}}</style></head><body onload="window.print()">'+cupom+'</body></html>');
  w.document.close();
  setTimeout(()=>{ carrinho={}; document.getElementById('mesa').value=''; document.getElementById('obs').value=''; fecharCarrinho(); render(); }, 800);
}

carregar();
</script>
</body>
</html>
