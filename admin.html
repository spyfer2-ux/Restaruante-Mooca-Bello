<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Gerencial - Bodega Mooca Bello</title>
<style>
  :root{--ouro:#c8962a;--preto:#141210;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0d0b09;color:#f5efe2;padding-bottom:90px;}
  header{background:var(--preto);padding:16px;text-align:center;border-bottom:3px solid var(--ouro);position:sticky;top:0;z-index:20;}
  header h1{color:var(--ouro);font-size:20px;letter-spacing:1px;}
  header p{font-size:12px;color:#b9b0a0;margin-top:4px;}
  .cats{display:flex;gap:8px;overflow-x:auto;padding:12px;background:#17130f;position:sticky;top:70px;z-index:19;border-bottom:1px solid #2a2118;scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .cat-btn{flex:0 0 auto;background:#221a12;color:#e9dcc4;border:1px solid #3a2d1c;padding:10px 14px;border-radius:22px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;}
  .cat-btn.active{background:var(--ouro);color:#1b1409;border-color:var(--ouro);}
  .search{padding:12px;position:sticky;top:132px;z-index:18;background:#0d0b09;}
  .search input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #3a2d1c;background:#1a140e;color:#fff;font-size:15px;}
  .lista{padding:8px 12px;}
  .item{display:flex;gap:12px;align-items:center;background:#17130f;border:1px solid #2a2118;border-radius:14px;padding:10px;margin-bottom:10px;}
  .thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;background:#2a2118;flex:0 0 auto;}
  .thumb.empty{display:flex;align-items:center;justify-content:center;font-size:26px;color:#6b5c44;}
  .info{flex:1;min-width:0;}
  .info h3{font-size:15px;line-height:1.2;margin-bottom:5px;}
  .info .catlabel{font-size:11px;color:#8a7c64;margin-top:5px;}
  .preco-row{display:flex;align-items:center;gap:6px;}
  .preco-row .rs{color:var(--ouro);font-weight:700;font-size:15px;}
  .preco-row input{width:90px;padding:7px 8px;border-radius:8px;border:1px solid #3a2d1c;background:#1a140e;color:var(--ouro);font-size:15px;font-weight:700;}
  .acts{display:flex;flex-direction:column;gap:6px;flex:0 0 auto;}
  .btn{border:none;border-radius:9px;padding:8px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn-foto{background:var(--ouro);color:#1b1409;}
  .btn-rem{background:#3a2118;color:#e79c9c;}
  .vazio{text-align:center;color:#8a7c64;padding:40px 20px;}
  .footer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--preto);border-top:2px solid var(--ouro);padding:12px;display:flex;gap:10px;z-index:30;}
  .footer-bar .btn{flex:1;padding:14px;font-size:15px;}
  .btn-gerar{background:var(--ouro);color:#1b1409;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal.open{display:flex;}
  .modal-box{background:#17130f;border:1px solid var(--ouro);border-radius:14px;padding:18px;max-width:520px;width:100%;max-height:85vh;overflow:auto;}
  .modal-box h2{color:var(--ouro);font-size:16px;margin-bottom:10px;}
  .modal-box textarea{width:100%;height:200px;background:#0d0b09;color:#cfc6b3;border:1px solid #3a2d1c;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;}
  .modal-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .modal-actions .btn{flex:1;padding:12px;}
  .btn-fechar{background:#2a2118;color:#e9dcc4;}
  .hint{font-size:12px;color:#b9b0a0;line-height:1.5;margin:8px 0;}
</style>
</head>
<body>
<header>
  <h1>⚙️ Painel Gerencial</h1>
  <p id="sub">Bodega Mooca Bello — fotos e preços</p>
</header>

<div class="cats" id="cats"></div>
<div class="search"><input id="busca" type="text" placeholder="🔎 Buscar item pelo nome..."></div>
<div class="lista" id="lista"></div>

<div class="footer-bar">
  <button class="btn btn-gerar" onclick="gerar()">💾 Gerar arquivo (dados.json)</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2>📄 dados.json atualizado</h2>
    <p class="hint">Alteração(ões) feita(s)! Agora escolha uma opção:<br>1️⃣ <b>Baixar</b> o arquivo e me enviar aqui no chat pra eu subir no GitHub. <br>2️⃣ Ou <b>Copiar</b> e colar direto no GitHub.</p>
    <textarea id="saida" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-gerar" onclick="baixar()">⬇️ Baixar arquivo</button>
      <button class="btn btn-foto" onclick="copiar()">📋 Copiar</button>
      <button class="btn btn-fechar" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script>
let DADOS=null, catAtual='todas', busca='', itemEditando=null;

async function carregar(){
  const r = await fetch('./dados.json?v='+Date.now());
  DADOS = await r.json();
  DADOS.produtos.forEach((p,i)=>p.__i=i);
  renderCats();
  render();
}

function renderCats(){
  const c = document.getElementById('cats');
  let h = '<button class="cat-btn '+(catAtual==='todas'?'active':'')+'" onclick="setCat(\'todas\')">📋 Todas</button>';
  DADOS.categorias.forEach(cat=>{
    h += '<button class="cat-btn '+(catAtual===cat.id?'active':'')+'" onclick="setCat(\''+cat.id+'\')">'+cat.icone+' '+cat.nome+'</button>';
  });
  c.innerHTML = h;
}
function setCat(id){catAtual=id;renderCats();render();window.scrollTo(0,0);}

document.getElementById('busca').addEventListener('input',e=>{busca=e.target.value.toLowerCase();render();});

function catNome(id){const c=DADOS.categorias.find(x=>x.id===id);return c?c.icone+' '+c.nome:id;}

function render(){
  const lista = document.getElementById('lista');
  let items = DADOS.produtos.filter(p=>{
    const okCat = catAtual==='todas' || p.cat===catAtual;
    const okBusca = !busca || p.nome.toLowerCase().includes(busca);
    return okCat && okBusca;
  });
  if(!items.length){lista.innerHTML='<div class="vazio">Nenhum item encontrado.</div>';return;}
  lista.innerHTML = items.map(p=>{
    const tem = p.foto && p.foto.length>4;
    const thumb = tem ? '<img class="thumb" src="'+p.foto+'">' : '<div class="thumb empty">🍽️</div>';
    const precoStr = p.preco.toFixed(2).replace(".",",");
    return '<div class="item">'+thumb+
      '<div class="info"><h3>'+p.nome+'</h3>'+
        '<div class="preco-row"><span class="rs">R$</span><input type="text" inputmode="decimal" value="'+precoStr+'" onchange="mudarPreco('+p.__i+',this.value)"></div>'+
        '<div class="catlabel">'+catNome(p.cat)+'</div></div>'+
      '<div class="acts"><button class="btn btn-foto" onclick="trocarFoto('+p.__i+')">📷 Trocar foto</button>'+
      (tem?'<button class="btn btn-rem" onclick="removerFoto('+p.__i+')">Remover foto</button>':'')+
      '</div></div>';
  }).join('');
}

function mudarPreco(i,val){
  let n = parseFloat(String(val).replace(',','.'));
  if(isNaN(n)||n<0){alert('Preço inválido. Use por exemplo: 12,90');render();return;}
  DADOS.produtos[i].preco = Math.round(n*100)/100;
}

const fileInput = document.getElementById('fileInput');
function trocarFoto(i){itemEditando=i;fileInput.value='';fileInput.click();}
fileInput.addEventListener('change',e=>{
  const f = e.target.files[0]; if(!f||itemEditando===null) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const max=500; let w=img.width, h=img.height;
      if(w>h){if(w>max){h=h*max/w;w=max;}} else {if(h>max){w=w*max/h;h=max;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      DADOS.produtos[itemEditando].foto = cv.toDataURL('image/jpeg',0.72);
      itemEditando=null; render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
});
function removerFoto(i){DADOS.produtos[i].foto='';render();}

function gerar(){
  const out = JSON.parse(JSON.stringify(DADOS));
  out.produtos.forEach(p=>delete p.__i);
  document.getElementById('saida').value = JSON.stringify(out,null,2);
  document.getElementById('modal').classList.add('open');
}
function fecharModal(){document.getElementById('modal').classList.remove('open');}
function copiar(){const t=document.getElementById('saida');t.select();document.execCommand('copy');alert('Copiado! Cole no arquivo dados.json do GitHub.');}
function baixar(){
  const blob = new Blob([document.getElementById('saida').value],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dados.json'; a.click();
}

carregar();
</script>

<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
</body>
</html>
