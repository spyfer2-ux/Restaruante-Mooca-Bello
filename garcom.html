<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comanda do Garçom - Bodega Mooca Bello</title>
<style>
  :root{--ouro:#c8962a;--preto:#141210;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0d0b09;color:#f5efe2;padding-bottom:150px;}
  header{background:var(--preto);padding:14px;text-align:center;border-bottom:3px solid var(--ouro);position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:center;gap:10px;}
  header h1{color:var(--ouro);font-size:17px;letter-spacing:1px;}
  .cx-btn{position:absolute;right:12px;background:#221a12;border:1px solid #3a2d1c;color:#e9dcc4;border-radius:20px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;}
  .secao-tit{padding:12px 12px 4px;font-size:13px;color:#8a7c64;text-transform:uppercase;letter-spacing:1px;}
  .mesas{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px 12px;}
  .mesa-btn{background:#221a12;color:#e9dcc4;border:1px solid #3a2d1c;padding:16px 0;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;transition:.15s;}
  .mesa-btn.active{background:var(--ouro);color:#1b1409;border-color:var(--ouro);}
  .mesa-btn .ped{display:block;font-size:10px;font-weight:600;margin-top:3px;color:#c98;}
  .mesa-btn.active .ped{color:#5a3a12;}
  .cats{display:flex;gap:8px;overflow-x:auto;padding:10px 12px;background:#17130f;border-bottom:1px solid #2a2118;scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .cat-btn{flex:0 0 auto;background:#221a12;color:#e9dcc4;border:1px solid #3a2d1c;padding:9px 13px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .cat-btn.active{background:var(--ouro);color:#1b1409;border-color:var(--ouro);}
  .search{padding:10px 12px;}
  .search input{width:100%;padding:11px 14px;border-radius:12px;border:1px solid #3a2d1c;background:#1a140e;color:#fff;font-size:15px;}
  .lista{padding:4px 12px;}
  .prod{display:flex;gap:10px;align-items:center;background:#17130f;border:1px solid #2a2118;border-radius:12px;padding:9px;margin-bottom:8px;}
  .prod .info{flex:1;min-width:0;}
  .prod h3{font-size:14px;line-height:1.2;}
  .prod .preco{color:var(--ouro);font-weight:700;font-size:13px;margin-top:2px;}
  .add{background:var(--ouro);color:#1b1409;border:none;border-radius:10px;width:42px;height:42px;font-size:22px;font-weight:700;cursor:pointer;flex:0 0 auto;}
  .aviso{padding:20px;text-align:center;color:#8a7c64;}
  .comanda{position:fixed;bottom:0;left:0;right:0;background:var(--preto);border-top:2px solid var(--ouro);z-index:40;max-height:80vh;display:flex;flex-direction:column;}
  .comanda-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .comanda-head .t{font-weight:700;color:var(--ouro);}
  .comanda-head .tot{font-size:16px;font-weight:700;}
  .comanda-body{overflow:auto;padding:0 12px;display:none;}
  .comanda.aberta .comanda-body{display:block;}
  .citem{background:#17130f;border:1px solid #2a2118;border-radius:10px;padding:10px;margin-bottom:8px;}
  .citem .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .citem .nome{font-size:14px;font-weight:600;flex:1;}
  .citem .rem{background:#3a2118;color:#e79c9c;border:none;border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer;}
  .qtd{display:flex;align-items:center;gap:10px;margin-top:8px;}
  .qtd button{width:34px;height:34px;border-radius:8px;border:1px solid #3a2d1c;background:#221a12;color:#fff;font-size:18px;font-weight:700;cursor:pointer;}
  .qtd .n{font-size:16px;font-weight:700;min-width:22px;text-align:center;}
  .qtd .sub{margin-left:auto;color:var(--ouro);font-weight:700;}
  .obs{width:100%;margin-top:8px;padding:9px;border-radius:8px;border:1px solid #3a2d1c;background:#1a140e;color:#fff;font-size:13px;}
  .obs::placeholder{color:#6b5c44;}
  .comanda-foot{padding:12px;display:flex;gap:8px;border-top:1px solid #2a2118;flex-wrap:wrap;}
  .btn{border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;flex:1;}
  .btn-enviar{background:#2a4d1e;color:#c6f0a8;}
  .btn-fechar-c{background:var(--ouro);color:#1b1409;}
  .btn-limpar{background:#2a2118;color:#e9dcc4;flex:0 0 auto;padding:14px 16px;}
  .status-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:8px;}
  .st-aberta{background:#3a2d1c;color:#e9dcc4;}
  .st-enviada{background:#1e4d2b;color:#a7e7b8;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:60;padding:16px;}
  .modal.open{display:flex;}
  .modal-box{background:#17130f;border:1px solid var(--ouro);border-radius:14px;padding:18px;max-width:480px;width:100%;max-height:88vh;overflow:auto;}
  .modal-box h2{color:var(--ouro);font-size:17px;margin-bottom:6px;}
  .resumo{background:#0d0b09;border:1px solid #2a2118;border-radius:10px;padding:12px;font-size:14px;line-height:1.7;white-space:pre-wrap;margin:10px 0;}
  .modal-box .btn{width:100%;margin-top:8px;}
  .btn-fechar{background:#2a2118;color:#e9dcc4;}
  .vazio-com{padding:16px;text-align:center;color:#6b5c44;font-size:13px;}
  .campo-lbl{font-size:13px;color:#b9b0a0;margin:12px 0 6px;display:block;}
  .pgtos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .pg-btn{background:#221a12;border:1px solid #3a2d1c;color:#e9dcc4;border-radius:10px;padding:14px 4px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;}
  .pg-btn.sel{background:var(--ouro);color:#1b1409;border-color:var(--ouro);}
  .divisao{display:flex;align-items:center;gap:10px;margin-top:6px;}
  .divisao input{width:70px;padding:10px;border-radius:8px;border:1px solid #3a2d1c;background:#1a140e;color:#fff;font-size:16px;font-weight:700;text-align:center;}
  .por-pessoa{color:var(--ouro);font-weight:700;font-size:15px;}
  .cx-linha{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2a2118;font-size:14px;}
  .cx-tot{font-size:20px;font-weight:800;color:var(--ouro);text-align:center;margin:12px 0;}
</style>
</head>
<body>
<header>
  <h1>🧾 Comanda do Garçom</h1>
  <button class="cx-btn" style="right:auto;left:12px" onclick="location.href='relatorio.html'">📊 Relatório</button>
  <button class="cx-btn" onclick="abrirCaixa()">💰 Caixa</button>
</header>

<div style="text-align:center;font-size:11px;padding:4px 0;background:#0d0b09" id="nuvem">☁️</div>
<div class="secao-tit">Mesa</div>
<div class="mesas" id="mesas"></div>

<div class="cats" id="cats"></div>
<div class="search"><input id="busca" type="text" placeholder="🔎 Buscar item..."></div>
<div class="lista" id="lista"></div>

<div class="comanda" id="comanda">
  <div class="comanda-head" onclick="toggleComanda()">
    <div><span class="t">Comanda</span> <span id="mesaTag"></span></div>
    <div class="tot" id="totHead">R$ 0,00 ▲</div>
  </div>
  <div class="comanda-body" id="comandaBody"></div>
  <div class="comanda-foot">
    <button class="btn btn-limpar" onclick="limparComanda()">🗑️</button>
    <button class="btn btn-enviar" onclick="enviarCozinha()">📤 Cozinha</button>
    <button class="btn btn-fechar-c" onclick="abrirFechamento()">💳 Fechar conta</button>
  </div>
</div>

<!-- modal envio cozinha -->
<div class="modal" id="modalEnvio">
  <div class="modal-box">
    <h2>✅ Pedido enviado!</h2>
    <p style="font-size:13px;color:#b9b0a0">Mesa marcada como <b>enviada pra cozinha</b>:</p>
    <div class="resumo" id="resumoEnvio"></div>
    <button class="btn btn-enviar" onclick="copiar('resumoEnvio')">📋 Copiar</button>
    <button class="btn btn-fechar" onclick="fechar('modalEnvio')">Fechar</button>
  </div>
</div>

<!-- modal fechamento de conta -->
<div class="modal" id="modalFech">
  <div class="modal-box">
    <h2>💳 Fechar conta — Mesa <span id="fechMesa"></span></h2>
    <div class="resumo" id="resumoFech"></div>
    <span class="campo-lbl">Dividir a conta entre:</span>
    <div class="divisao">
      <button class="qtd" style="width:38px;height:38px;border-radius:8px;border:1px solid #3a2d1c;background:#221a12;color:#fff;font-size:18px;font-weight:700;cursor:pointer" onclick="mudarPessoas(-1)">−</button>
      <input id="numPessoas" type="number" value="1" min="1" onchange="calcDivisao()">
      <span>pessoa(s)</span>
      <span class="por-pessoa" id="porPessoa"></span>
    </div>
    <span class="campo-lbl">Forma de pagamento:</span>
    <div class="pgtos">
      <button class="pg-btn" data-pg="Pix" onclick="selPg('Pix')">📱 Pix</button>
      <button class="pg-btn" data-pg="Dinheiro" onclick="selPg('Dinheiro')">💵 Dinheiro</button>
      <button class="pg-btn" data-pg="Cartão" onclick="selPg('Cartão')">💳 Cartão</button>
    </div>
    <button class="btn btn-fechar-c" onclick="confirmarFechamento()">✅ Confirmar pagamento</button>
    <button class="btn btn-fechar" onclick="fechar('modalFech')">Cancelar</button>
  </div>
</div>

<!-- modal caixa / faturamento -->
<div class="modal" id="modalCaixa">
  <div class="modal-box">
    <h2>💰 Caixa do dia</h2>
    <div id="caixaConteudo"></div>
    <button class="btn btn-fechar-c" onclick="fecharCaixaDia()">🔒 Fechar caixa (zerar dia)</button>
    <button class="btn btn-fechar" onclick="fechar('modalCaixa')">Voltar</button>
  </div>
</div>

<script>
let DADOS=null, catAtual='todas', busca='', mesaAtual=1;
let comandas={}, caixa=null, pgSel=null;

const LS_COM='comandas_bmb', LS_CX='caixa_bmb', LS_HIST='historico_bmb';
const API_URL='https://pdv-vendas.spyfer2.workers.dev';
const LS_PIN='pin_bmb', LS_FILA='fila_bmb';
let historico=[], fila={vendas:[],pagamentos:[]};
function getPin(){
  let pin=localStorage.getItem(LS_PIN);
  if(!pin){pin=prompt('PIN do banco de vendas (uma vez só neste aparelho):')||'';if(pin)localStorage.setItem(LS_PIN,pin.trim());}
  return (pin||'').trim();
}
function salvarFila(){localStorage.setItem(LS_FILA,JSON.stringify(fila));atualizarNuvem();}
function atualizarNuvem(){
  const el=document.getElementById('nuvem');if(!el)return;
  const pend=fila.vendas.length+fila.pagamentos.length;
  el.textContent=pend?('☁️ '+pend+' p/ enviar'):'☁️ ok';
  el.style.color=pend?'#e7b95c':'#8fc98f';
}
let sincronizando=false;
async function sincronizar(){
  if(sincronizando)return;
  const pend=fila.vendas.length+fila.pagamentos.length;
  if(!pend||!navigator.onLine)return;
  const pin=getPin();if(!pin)return;
  sincronizando=true;
  try{
    const r=await fetch(API_URL+'/api/registros',{method:'POST',
      headers:{'Content-Type':'application/json','X-PIN':pin},
      body:JSON.stringify(fila)});
    if(r.status===401){localStorage.removeItem(LS_PIN);alert('PIN do banco de vendas incorreto. Tente de novo no próximo pedido.');}
    else if(r.ok){fila={vendas:[],pagamentos:[]};localStorage.setItem(LS_FILA,JSON.stringify(fila));}
  }catch(e){/* offline — fica na fila */}
  sincronizando=false;atualizarNuvem();
}
window.addEventListener('online',sincronizar);
setInterval(sincronizar,60000);
function hoje(){return new Date().toISOString().slice(0,10);}
function agora(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function salvarCom(){localStorage.setItem(LS_COM,JSON.stringify(comandas));}
function salvarCx(){localStorage.setItem(LS_CX,JSON.stringify(caixa));}
function salvarHist(){localStorage.setItem(LS_HIST,JSON.stringify(historico));}
function registrarVenda(c,origem){
  // computa no faturamento tudo que ainda não foi registrado (qtd além do já enviado)
  const novos=[];
  c.itens.forEach(it=>{const env=it.env||0; if(it.qtd>env){novos.push({nome:it.nome,qtd:it.qtd-env,preco:it.preco}); it.env=it.qtd;}});
  if(novos.length){
    const reg={tipo:'venda',origem:origem,data:hoje(),hora:agora(),mesa:mesaAtual,itens:novos,
      total:Math.round(novos.reduce((s,i)=>s+i.preco*i.qtd,0)*100)/100};
    historico.push(reg);salvarHist();
    fila.vendas.push({id:(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random()),ts:Date.now(),
      data:reg.data,hora:reg.hora,mesa:reg.mesa,origem:origem,itens:novos});
    salvarFila();sincronizar();
  }
  return novos.length;
}
function money(v){return 'R$ '+v.toFixed(2).replace('.',',');}

async function init(){
  try{comandas=JSON.parse(localStorage.getItem(LS_COM))||{};}catch(e){comandas={};}
  try{caixa=JSON.parse(localStorage.getItem(LS_CX));}catch(e){caixa=null;}
  try{historico=JSON.parse(localStorage.getItem(LS_HIST))||[];}catch(e){historico=[];}
  try{fila=JSON.parse(localStorage.getItem(LS_FILA))||{vendas:[],pagamentos:[]};}catch(e){fila={vendas:[],pagamentos:[]};}
  atualizarNuvem();setTimeout(sincronizar,1500);
  if(!caixa || caixa.dia!==hoje()){caixa={dia:hoje(),vendas:[]};salvarCx();}
  const r=await fetch('./dados.json?v='+Date.now());DADOS=await r.json();
  renderMesas();renderCats();render();renderComanda();
}

function getComanda(m){if(!comandas[m])comandas[m]={itens:[],status:'aberta'};return comandas[m];}
function totalComanda(c){return c.itens.reduce((s,i)=>s+i.preco*i.qtd,0);}

function renderMesas(){
  let h='';
  for(let i=1;i<=8;i++){
    const c=comandas[i];let ped='';
    if(c&&c.itens.length){ped='<span class="ped">'+(c.status==='enviada'?'✅ '+money(totalComanda(c)):c.itens.length+' item(s)')+'</span>';}
    h+='<button class="mesa-btn '+(mesaAtual===i?'active':'')+'" onclick="setMesa('+i+')">'+i+ped+'</button>';
  }
  document.getElementById('mesas').innerHTML=h;
}
function setMesa(m){mesaAtual=m;renderMesas();renderComanda();}

function renderCats(){
  let h='<button class="cat-btn '+(catAtual==='todas'?'active':'')+'" onclick="setCat(\'todas\')">📋 Todas</button>';
  DADOS.categorias.forEach(cat=>{h+='<button class="cat-btn '+(catAtual===cat.id?'active':'')+'" onclick="setCat(\''+cat.id+'\')">'+cat.icone+' '+cat.nome+'</button>';});
  document.getElementById('cats').innerHTML=h;
}
function setCat(id){catAtual=id;renderCats();render();}
document.getElementById('busca').addEventListener('input',e=>{busca=e.target.value.toLowerCase();render();});

function render(){
  let items=DADOS.produtos.filter(p=>p.ativo!==false&&(catAtual==='todas'||p.cat===catAtual)&&(!busca||p.nome.toLowerCase().includes(busca)));
  const lista=document.getElementById('lista');
  if(!items.length){lista.innerHTML='<div class="aviso">Nenhum item.</div>';return;}
  lista.innerHTML=items.map(p=>{const idx=DADOS.produtos.indexOf(p);
    return '<div class="prod"><div class="info"><h3>'+p.nome+'</h3><div class="preco">'+money(p.preco)+'</div></div><button class="add" onclick="addItem('+idx+')">+</button></div>';}).join('');
}

function addItem(idx){
  const p=DADOS.produtos[idx];const c=getComanda(mesaAtual);
  if(c.status==='enviada')c.status='aberta';
  const ex=c.itens.find(i=>i.nome===p.nome&&!i.obs);
  if(ex)ex.qtd++;else c.itens.push({nome:p.nome,preco:p.preco,qtd:1,obs:''});
  salvarCom();renderMesas();renderComanda();document.getElementById('comanda').classList.add('aberta');renderComanda();
}

function renderComanda(){
  const c=getComanda(mesaAtual);
  document.getElementById('mesaTag').innerHTML='Mesa '+mesaAtual+' <span class="status-tag '+(c.status==='enviada'?'st-enviada':'st-aberta')+'">'+(c.status==='enviada'?'✅ Enviada':'Aberta')+'</span>';
  const body=document.getElementById('comandaBody');
  if(!c.itens.length){body.innerHTML='<div class="vazio-com">Nenhum item nesta mesa ainda.<br>Toque no + dos produtos acima.</div>';}
  else{body.innerHTML=c.itens.map((it,i)=>{const sub=it.preco*it.qtd;
    return '<div class="citem"><div class="top"><div class="nome">'+it.nome+'</div><button class="rem" onclick="remItem('+i+')">remover</button></div>'+
      '<div class="qtd"><button onclick="mudarQtd('+i+',-1)">−</button><span class="n">'+it.qtd+'</span><button onclick="mudarQtd('+i+',1)">+</button><span class="sub">'+money(sub)+'</span></div>'+
      '<input class="obs" type="text" placeholder="Obs. p/ cozinha (ex: bem passado, mais escuro)" value="'+(it.obs||'').replace(/"/g,'&quot;')+'" onchange="mudarObs('+i+',this.value)"></div>';}).join('');}
  const ab=document.getElementById('comanda').classList.contains('aberta');
  document.getElementById('totHead').innerHTML=money(totalComanda(c))+' '+(ab?'▼':'▲');
}

function mudarQtd(i,d){const c=getComanda(mesaAtual);c.itens[i].qtd+=d;if(c.itens[i].qtd<1)c.itens.splice(i,1);if(c.status==='enviada')c.status='aberta';salvarCom();renderMesas();renderComanda();}
function remItem(i){const c=getComanda(mesaAtual);c.itens.splice(i,1);if(c.status==='enviada')c.status='aberta';salvarCom();renderMesas();renderComanda();}
function mudarObs(i,v){const c=getComanda(mesaAtual);c.itens[i].obs=v;if(c.status==='enviada')c.status='aberta';salvarCom();}
function toggleComanda(){document.getElementById('comanda').classList.toggle('aberta');renderComanda();}
function limparComanda(){if(!confirm('Limpar a comanda da Mesa '+mesaAtual+'?'))return;comandas[mesaAtual]={itens:[],status:'aberta'};salvarCom();renderMesas();renderComanda();}

function enviarCozinha(){
  const c=getComanda(mesaAtual);if(!c.itens.length){alert('Adicione itens antes de enviar.');return;}
  registrarVenda(c,'cozinha');
  c.status='enviada';salvarCom();renderMesas();renderComanda();
  let txt='MESA '+mesaAtual+'\n----------------\n';
  c.itens.forEach(it=>{txt+=it.qtd+'x '+it.nome+'\n';if(it.obs)txt+='   >> '+it.obs+'\n';});
  txt+='----------------\nTOTAL: '+money(totalComanda(c));
  document.getElementById('resumoEnvio').textContent=txt;
  document.getElementById('modalEnvio').classList.add('open');
}

/* ---- FECHAMENTO DE CONTA ---- */
function abrirFechamento(){
  const c=getComanda(mesaAtual);if(!c.itens.length){alert('Não há itens nesta mesa.');return;}
  pgSel=null;
  document.getElementById('fechMesa').textContent=mesaAtual;
  let txt='';c.itens.forEach(it=>{txt+=it.qtd+'x '+it.nome+'  '+money(it.preco*it.qtd)+'\n';});
  txt+='----------------\nTOTAL: '+money(totalComanda(c));
  document.getElementById('resumoFech').textContent=txt;
  document.getElementById('numPessoas').value=1;
  document.querySelectorAll('.pg-btn').forEach(b=>b.classList.remove('sel'));
  calcDivisao();
  document.getElementById('modalFech').classList.add('open');
}
function mudarPessoas(d){const inp=document.getElementById('numPessoas');let n=parseInt(inp.value)||1;n=Math.max(1,n+d);inp.value=n;calcDivisao();}
function calcDivisao(){
  const c=getComanda(mesaAtual);let n=parseInt(document.getElementById('numPessoas').value)||1;if(n<1)n=1;
  const t=totalComanda(c);
  document.getElementById('porPessoa').textContent = n>1 ? (money(t/n)+' cada') : '';
}
function selPg(p){pgSel=p;document.querySelectorAll('.pg-btn').forEach(b=>b.classList.toggle('sel',b.dataset.pg===p));}
function confirmarFechamento(){
  if(!pgSel){alert('Escolha a forma de pagamento.');return;}
  const c=getComanda(mesaAtual);const t=totalComanda(c);const n=parseInt(document.getElementById('numPessoas').value)||1;
  registrarVenda(c,'fechamento'); // garante que item não enviado à cozinha também conte no faturamento
  historico.push({tipo:'pagamento',data:hoje(),hora:agora(),mesa:mesaAtual,total:t,pgto:pgSel,pessoas:n});
  salvarHist();
  fila.pagamentos.push({id:(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random()),ts:Date.now(),
    data:hoje(),hora:agora(),mesa:mesaAtual,total:t,pgto:pgSel,pessoas:n});
  salvarFila();sincronizar();
  caixa.vendas.push({mesa:mesaAtual,total:t,pgto:pgSel,pessoas:n,hora:agora()});
  salvarCx();
  comandas[mesaAtual]={itens:[],status:'aberta'};salvarCom();
  fechar('modalFech');renderMesas();renderComanda();
  alert('✅ Mesa '+mesaAtual+' fechada!\n'+money(t)+' — '+pgSel+'\nRegistrado no caixa.');
}

/* ---- CAIXA ---- */
function abrirCaixa(){
  const v=caixa.vendas;const tot=v.reduce((s,x)=>s+x.total,0);
  const porForma={Pix:0,Dinheiro:0,'Cartão':0};v.forEach(x=>porForma[x.pgto]=(porForma[x.pgto]||0)+x.total);
  let h='<p style="font-size:13px;color:#b9b0a0">Dia: '+caixa.dia.split('-').reverse().join('/')+' — '+v.length+' venda(s)</p>';
  h+='<div class="cx-tot">'+money(tot)+'</div>';
  h+='<div class="cx-linha"><span>📱 Pix</span><b>'+money(porForma.Pix||0)+'</b></div>';
  h+='<div class="cx-linha"><span>💵 Dinheiro</span><b>'+money(porForma.Dinheiro||0)+'</b></div>';
  h+='<div class="cx-linha"><span>💳 Cartão</span><b>'+money(porForma['Cartão']||0)+'</b></div>';
  if(v.length){h+='<p class="campo-lbl">Mesas fechadas hoje:</p>';v.slice().reverse().forEach(x=>{h+='<div class="cx-linha"><span>'+x.hora+' · Mesa '+x.mesa+' · '+x.pgto+'</span><b>'+money(x.total)+'</b></div>';});}
  document.getElementById('caixaConteudo').innerHTML=h;
  document.getElementById('modalCaixa').classList.add('open');
}
function fecharCaixaDia(){
  if(!confirm('Fechar o caixa e zerar as vendas de hoje? (anote o total antes)'))return;
  caixa={dia:hoje(),vendas:[]};salvarCx();abrirCaixa();
}

function copiar(id){const t=document.getElementById(id).textContent;navigator.clipboard&&navigator.clipboard.writeText(t);alert('Copiado!');}
function fechar(id){document.getElementById(id).classList.remove('open');}

init();
</script>
